# ===== Scouter API =====
scouter.api.url=http://127.0.0.1:6188/scouter/v1/object
# optional: "Bearer xxx" 같은 값
scouter.auth.header=
http.timeout.seconds=10

# ===== MySQL =====
db.mysql.jdbcUrl=jdbc:mysql://localhost:3306/TESTDB
db.mysql.username=test
db.mysql.password=test
db.mysql.poolSize=10
db.mysql.minimumIdle=1
db.mysql.connectionTimeout.ms=10000
db.mysql.idleTimeout.ms=60000
db.mysql.maxLifetime.seconds=10
db.mysql.rewriteBatchedStatements=true
db.mysql.cachePrepStmts=true
db.mysql.prepStmtCacheSize=250
db.mysql.prepStmtCacheSqlLimit=2048

# ===== Object Sync =====
sync.enabled=true
sync.interval.seconds=3600
inactive.grace.minutes=1440
batch.size=500

# ===== Kafka Consumer =====
dispatch.enabled=true
kafka.bootstrap.servers=127.0.0.1:9092
kafka.group.id=apm-alert-dispatcher
kafka.topic.alert=scouter.alert.raw
kafka.auto.offset.reset=earliest
kafka.enable.auto.commit=false
kafka.max.poll.records=500
kafka.poll.timeout.ms=1000

dispatch.workerThreads=4

# ===== SMS (현재는 로그 발송 예시) =====
dispatch.sms.enabled=true

# ===== Logging =====
log.dir=/Logs/scouter/batchapp
log.file.prefix=apm-daemon-batchapp
log.timezone=Asia/Seoul
log.showDateTime=true
log.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS XXX
log.append=true
# 로그 보관 기간(일). 0 이하면 삭제 안 함
log.retention.days=60
# 하루에 몇 시에 정리할지 (0~23)
log.cleanup.hour=3
log.showThreadName=true
log.showLogName=true
log.showShortLogName=false
log.levelInBrackets=true

# ===== EAI =====
sys.SysId=HI-APM

# 검증계
sys.sURL=http://127.0.0.1:8080/test
# 운영계
#sys.sURL=

# ===== ETL =====
#etl.enabled=false
etl.enabled=true
etl.interval.seconds=60
etl.lookback.minutes=10
etl.query.delay.seconds=15

etl.overlap.minutes=2
etl.max.window.minutes=60

etl.influx.url=http://127.0.0.1:8086
etl.influx.user=root
etl.influx.pass=root
etl.influx.db=scouterCounter

etl.jobs=1m,5m,1h,1d
etl.tags=obj,objFamily,objType,objHashTag

etl.fields=ActiveService,ActiveService_Max,ApiErrorRate,ApiTPS,ApiTime,ApiTimeByService,CpuTime,Elapsed90,ElapsedTime,ErrorRate,GcCount,GcTime,HeapTotal,HeapUsed,HeapUsed_Max,PermPercent,PermUsed,QueuingTime,RecentUser,ServiceCount,SqlErrorRate,SqlTPS,SqlTime,SqlTimeByService,TPS,TPS_Max

etl.job.1m.influx.measurement=counter_1m
etl.job.1m.mysql.table=scouter_counter_1m
etl.job.1m.state.file=./config/etl_state_1m.properties
etl.job.1m.lookback.minutes=60
etl.job.1m.query.delay.seconds=90
etl.job.1m.window.seconds=60
etl.job.1m.window.offset.seconds=0

etl.job.5m.influx.measurement=counter_5m
etl.job.5m.mysql.table=scouter_counter_5m
etl.job.5m.state.file=./config/etl_state_5m.properties
etl.job.5m.lookback.minutes=180
etl.job.5m.query.delay.seconds=180
etl.job.5m.window.seconds=300
etl.job.5m.window.offset.seconds=0

etl.job.1h.influx.measurement=counter_1h
etl.job.1h.mysql.table=scouter_counter_1h
etl.job.1h.state.file=./config/etl_state_1h.properties
etl.job.1h.lookback.minutes=1440
etl.job.1h.query.delay.seconds=900
etl.job.1h.window.seconds=3600
etl.job.1h.window.offset.seconds=0

etl.job.1d.influx.measurement=counter_1d
etl.job.1d.mysql.table=scouter_counter_1d
etl.job.1d.state.file=./config/etl_state_1d.properties
etl.job.1d.lookback.minutes=4320
etl.job.1d.query.delay.seconds=7200
etl.job.1d.window.seconds=86400
etl.job.1d.window.offset.seconds=-32400

# ===== xlog-profile =====
xlog.profile.enabled=true
xlog.profile.kafka.topic=scouter.xlog.profile
xlog.profile.kafka.group.id=apm-xlog-profile-consumer
xlog.profile.kafka.client.id=apm-xlog-profile-consumer
xlog.profile.store.raw.base64=false
xlog.profile.store.payload.json=false
xlog.profile.store.step.raw.json=false
xlog.profile.mysql.header.table=scouter_xlog_profile
xlog.profile.mysql.step.table=scouter_xlog_profile_step
xlog.profile.mysql.reject.table=scouter_xlog_profile_reject
xlog.profile.mysql.header.batch.size=500
xlog.profile.mysql.step.batch.size=5000
# DB flush/commit window - 1 = near-real-time / 300 = 5 minutes / 600 = 10 minutes
#xlog.profile.flush.interval.ms=-1
xlog.profile.flush.interval.seconds=300
# Safety valves for memory. Flush earlier when these limits are hit.
xlog.profile.max.buffered.messages=5000
xlog.profile.max.buffered.steps=100000
xlog.profile.max.buffered.rejects=1000
# Logging - Summary only every 5 minutes by default.
xlog.profile.log.summary.enabled=true
#xlog.profile.log.summary.interval.ms=-1
xlog.profile.log.summary.interval.seconds=300
xlog.profile.log.slow.flush.ms=5000



